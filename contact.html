<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Desert Light Weddings | Scottsdale Wedding Photographer</title>
    <meta name="description" content="Contact Desert Light Weddings to check availability for your Scottsdale or Arizona wedding.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="nav">
        <div class="nav-container">
            <a href="index.html" class="logo">Desert Light Weddings</a>
            <div class="nav-links">
                <a href="portfolio.html">Portfolio</a>
                <a href="about.html">About</a>
                <a href="pricing.html">Pricing</a>
                <a href="contact.html">Contact</a>
            </div>
        </div>
    </nav>

    <section class="page-hero">
        <div class="container">
            <h1>Contact</h1>
        </div>
    </section>

    <section class="contact">
        <div class="container">
            <div class="contact-wrapper">
                <div class="contact-form">
                    <form>
                        <div class="form-group">
                            <label for="name">Your Name</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="partner">Partner's Name</label>
                            <input type="text" id="partner" name="partner">
                        </div>
                        <div class="form-group">
                            <label for="date">Wedding Date</label>
                            <input type="date" id="date" name="date">
                        </div>
                        <div class="form-group">
                            <label for="venue">Venue</label>
                            <input type="text" id="venue" name="venue">
                        </div>
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Send Message</button>
                    </form>
                </div>
                <div class="contact-info">
                    <h2>Get In Touch</h2>
                    <p>Email: <a href="mailto:hello@desertlightweddings.com">hello@desertlightweddings.com</a></p>
                    <p class="response-time">I respond within 24 hours</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>Desert Light Weddings &mdash; Scottsdale, AZ</p>
            <div class="footer-links">
                <a href="#">Instagram</a>
                <a href="mailto:hello@desertlightweddings.com">hello@desertlightweddings.com</a>
            </div>
        </div>
    </footer>

    <script>
        window.addEventListener('scroll', function() {
            const nav = document.querySelector('.nav');
            if (window.scrollY > 50) {
                nav.classList.add('nav-scrolled');
            } else {
                nav.classList.remove('nav-scrolled');
            }
        });
    </script>
</body>
</html>
